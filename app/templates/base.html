<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>{{ page_title or "SweatMarket" }}</title>
  <!-- Tailwind + (optional) HTMX -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
  <!-- Top nav -->
  <nav class="px-4 py-3 bg-white shadow">
    <div class="max-w-5xl mx-auto flex items-center gap-4">
      <a class="font-semibold" href="/">🏋️ SweatMarket</a>

      <a href="/">Home</a>
      <a href="/offers">Offers</a>
      <a href="/wallet">Wallet</a>
      <a href="/dex">DEX</a>
      <a href="/posts">Posts</a>
      <a href="/profile/edit">Profile</a>

      <div class="ml-auto">
        {% if user %}
          <form method="post" action="/logout" class="inline">
            <button class="text-red-600">Logout ({{ user.username }})</button>
          </form>
        {% else %}
          <a class="mr-3" href="/login">Login</a>
          <a href="/signup">Signup</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto p-4">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
